function buildShiShenMap() {
  const ganIdx = { '甲':0,'乙':1,'丙':2,'丁':3,'戊':4,'己':5,'庚':6,'辛':7,'壬':8,'癸':9 };
  // 五行生克关系：同我/生我/我生/克我/我克

    SHI_SHEN_MAP[riGan] = {};
    const riWuxing = GAN_WUXING[riGan];
    const riYinyang = GAN_YINYANG[riGan];
    
    TIAN_GAN.forEach(gan => {
      const wuxing = GAN_WUXING[gan];
      const yinyang = GAN_YINYANG[gan];
      const sameYinYang = (riYinyang === yinyang);
      
      let shiShen;
      if (riWuxing === wuxing) {
        // 同五行 - 比劫
        shiShen = sameYinYang ? '比肩' : '劫财';
      } else if (wuxingShengWo(wuxing, riWuxing)) {
        // 生我者 - 印星
        shiShen = !sameYinYang ? '正印' : '偏印';
      } else if (wuxingShengWo(riWuxing, wuxing)) {
        // 我生者 - 食伤
        shiShen = sameYinYang ? '食神' : '伤官';
      } else if (wuxingKeWo(wuxing, riWuxing)) {
        // 克我者 - 官杀
        shiShen = !sameYinYang ? '正官' : '偏官';
      } else if (wuxingKeWo(riWuxing, wuxing)) {
        // 我克者 - 财星
        shiShen = !sameYinYang ? '正财' : '偏财';
      }
      SHI_SHEN_MAP[riGan][gan] = shiShen;
    });
  });
}

function wuxingShengWo(sheng, wo) {
  const shengCycle = { '木':'火', '火':'土', '土':'金', '金':'水', '水':'木' };
  return shengCycle[sheng] === wo;
}

function wuxingKeWo(ke, wo) {
  const keCycle = { '木':'土', '土':'水', '水':'火', '火':'金', '金':'木' };
  return keCycle[ke] === wo;
}

/**
 * 八字命盘核心计算引擎
 * 整合滴天髓、子平、盲派算法
 */

var BaziEngine = class {
  constructor() {
    this.dayGanZhiCache = null;
    this.cacheYear = null;
    this.cacheMonth = null;
    this.cacheDay = null;
  }

  /**
   * 计算完整的八字命盘
   * @param {number} year - 公历年
   * @param {number} month - 公历月 (1-12)
   * @param {number} day - 公历日
   * @param {number} hour - 时间 (0-23)
   * @param {number} minute - 分钟 (0-59)
   * @param {boolean} isMale - 性别（true=男 false=女）
   * @returns {object} 完整命盘数据
   */
  calculate(year, month, day, hour, minute, isMale) {
    // 根据出生时间调整日柱（23点后算次日）
    let adjustedDate = new Date(year, month - 1, day, hour, minute);
    let adjustedYear = adjustedDate.getFullYear();
    let adjustedMonth = adjustedDate.getMonth() + 1;
    let adjustedDay = adjustedDate.getDate();
    let adjustedHour = adjustedDate.getHours();
    
    // 计算四柱
    const yearPillar = this.calcYearPillar(adjustedYear, adjustedMonth, adjustedDay);
    const monthPillar = this.calcMonthPillar(adjustedYear, adjustedMonth, adjustedDay);
    const dayPillar = this.calcDayPillar(adjustedYear, adjustedMonth, adjustedDay);
    const hourPillar = this.calcHourPillar(dayPillar.gan, adjustedHour);
    
    // 日干
    const riGan = dayPillar.gan;
    
    // 地支藏干
    const cangGan = {
      year: ZHI_CANG_GAN[yearPillar.zhi],
      month: ZHI_CANG_GAN[monthPillar.zhi],
      day: ZHI_CANG_GAN[dayPillar.zhi],
      hour: ZHI_CANG_GAN[hourPillar.zhi]
    };
    
    // 纳音
    const nayin = {
      year: this.getNayin(yearPillar.ganZhi),
      month: this.getNayin(monthPillar.ganZhi),
      day: this.getNayin(dayPillar.ganZhi),
      hour: this.getNayin(hourPillar.ganZhi)
    };

    const shiShen = {
      year: SHI_SHEN_MAP[riGan][yearPillar.gan],
      month: SHI_SHEN_MAP[riGan][monthPillar.gan],
      day: SHI_SHEN_MAP[riGan][dayPillar.gan],
      hour: SHI_SHEN_MAP[riGan][hourPillar.gan]
    };
    
    // 十二长生（日干对应各柱地支）
    const changSheng = {
      year: this.getChangSheng(riGan, yearPillar.zhi),
      month: this.getChangSheng(riGan, monthPillar.zhi),
      day: this.getChangSheng(riGan, dayPillar.zhi),
      hour: this.getChangSheng(riGan, hourPillar.zhi)
    };
    
    // 空亡
    const kongWang = this.calcKongWang(dayPillar.ganZhi);
    
    // 神煞
    const shenSha = this.calcShenSha(riGan, yearPillar, monthPillar, dayPillar, hourPillar, adjustedYear);
    
    // 大运
    const daYun = this.calcDaYun(year, month, day, monthPillar, adjustedYear, adjustedMonth, adjustedDay, isMale);

    const sanYuan = this.calcSanYuan(monthPillar, hourPillar);

    const qiYunAge = this.calcQiYun(year, month, day, monthPillar, adjustedYear, adjustedMonth, adjustedDay, isMale);

    const shengXiao = SHENG_XIAO[DI_ZHI.indexOf(yearPillar.zhi)];

   * 计算年柱
   * 以立春为界，立春前按上一年算

  calcYearPillar(year, month, day) {
    // 立春通常在2月4日左右
    let effectiveYear = year;
    if (month < 2 || (month === 2 && day < 4)) {
      effectiveYear = year - 1;
    }
    
    const ganIdx = (effectiveYear - 4) % 10;
    const zhiIdx = (effectiveYear - 4) % 12;
    const gan = TIAN_GAN[ganIdx < 0 ? ganIdx + 10 : ganIdx];
    const zhi = DI_ZHI[zhiIdx < 0 ? zhiIdx + 12 : zhiIdx];
    
    return { gan, zhi, ganZhi: gan + zhi };
  }

  /**
   * 计算月柱
   * 以节气为界，正月为寅月（立春到惊蛰）
   */
  calcMonthPillar(year, month, day) {
    // 节气日期（近似）
    const jieQiDayMap = { 2:4, 3:6, 4:5, 5:6, 6:6, 7:7, 8:8, 9:8, 10:8, 11:8, 12:7, 1:6 };
    
    // 确定地支月份
    let yueZhiIdx;
    if (month === 1) {
      yueZhiIdx = (day >= 6) ? 0 : 11; // 小寒后为丑月(12), 否则还是子月(11)
    } else {
      const jqDay = jieQiDayMap[month] || 6;
      if (day >= jqDay) {
        yueZhiIdx = month - 2; // 立春后寅=0(正月), 惊蛰后卯=1(二月)...
      } else {
        yueZhiIdx = month - 3;
      }
    }
    
    if (yueZhiIdx < 0) yueZhiIdx += 12;
    
    const zhi = YUE_ZHI[yueZhiIdx];
    
    // 根据年干定月干
    const yearPillar = this.calcYearPillar(year, month, day);
    const gan = YUE_GAN_MAP[yearPillar.gan][yueZhiIdx];
    
    return { gan, zhi, ganZhi: gan + zhi };
  }

  /**
   * 计算日柱
   * 使用精确的数学算法：以1900-01-01为甲戌日（第11位）
   */
  calcDayPillar(year, month, day) {
    // 计算距离1900-01-01的天数
    const baseDate = new Date(1900, 0, 1);
    const targetDate = new Date(year, month - 1, day);
    let daysDiff = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
    
    // 1900-01-01 是甲戌日，在六十甲子中排第11位
    const baseIdx = 10; // 0-indexed: 甲戌是第10（0=甲子）
    let idx = (baseIdx + daysDiff) % 60;
    if (idx < 0) idx += 60;
    
    const gan = TIAN_GAN[idx % 10];
    const zhi = DI_ZHI[idx % 12];
    
    return { gan, zhi, ganZhi: gan + zhi };
  }

   */
  calcHourPillar(riGan, hour) {
    // 确定时支：23-1为子时(0), 1-3为丑时(1), ...
    let shiZhiIdx;
    if (hour === 23 || hour === 0) {
      shiZhiIdx = 0; // 子时
    } else {
      shiZhiIdx = Math.floor((hour + 1) / 2);
    }
    
    const zhi = SHI_ZHI[shiZhiIdx];
    const gan = SHI_GAN_MAP[riGan][shiZhiIdx];
    
    return { gan, zhi, ganZhi: gan + zhi };
  }

  /**
   * 获取纳音
   */
  getNayin(ganZhi) {
    return NAYIN_MAP[ganZhi] || '未知';
  }

  /**
   * 获取十二长生状态
   */
  getChangSheng(gan, zhi) {
    const zhiIdx = DI_ZHI.indexOf(zhi);
    const changShengZhis = CHANG_SHENG_TABLE[gan];
    if (!changShengZhis) return '未知';
    const idx = changShengZhis.indexOf(zhi);
    if (idx === -1) return '未知';
    return CHANG_SHENG_NAMES[idx];
  }

  /**
   * 计算空亡
   * 根据日柱干支确定空亡的两个地支
   */
  calcKongWang(riGanZhi) {
    // 六十甲子中，每旬（10天干配10地支）有两个地支轮空
    const riGan = riGanZhi[0];
    const riZhi = riGanZhi[1];
    
    // 找到日干支在六十甲子中的位置
    let riIdx = -1;
    for (let i = 0; i < LIUSHI_JIAZI.length; i++) {
      if (LIUSHI_JIAZI[i].ganZhi === riGanZhi) {
        riIdx = i;
        break;
      }
    }
    
    if (riIdx === -1) return ['', ''];
    
    // 计算本旬起始位置
    const xunStart = Math.floor(riIdx / 10) * 10;
    
    // 本旬中已有的地支
    const usedZhis = [];
    for (let i = xunStart; i < xunStart + 10; i++) {
      usedZhis.push(LIUSHI_JIAZI[i].ganZhi[1]);
    }
    
    // 找出缺少的两个地支（空亡）
    const kongWangZhis = [];
    for (let i = 0; i < 12; i++) {
      const zhi = DI_ZHI[(DI_ZHI.indexOf(usedZhis[9]) + 1 + i) % 12];
      if (!usedZhis.includes(zhi) && kongWangZhis.length < 2) {
        kongWangZhis.push(zhi);
      }
    }
    
    return kongWangZhis;
  }

  /**
   * 计算神煞
   */
  calcShenSha(riGan, yearPillar, monthPillar, dayPillar, hourPillar, year) {
    const result = { ji: [], xiong: [], other: [] };
    const riZhi = dayPillar.zhi;
    const nianZhi = yearPillar.zhi;
    const yueZhi = monthPillar.zhi;
    const allZhis = [nianZhi, yueZhi, riZhi, hourPillar.zhi];
    const riGanZhi = dayPillar.ganZhi;
    
    // 天乙贵人
    const tianYi = TIAN_YI_GUI_REN[riGan] || '';
    const tianYiZhis = [tianYi[0], tianYi[1]];
    allZhis.forEach((zhi, idx) => {
      if (tianYiZhis.includes(zhi)) {
        result.ji.push(`${['年','月','日','时'][idx]}柱天乙贵人`);
      }
    });
    
    // 文昌
    const wenChangZhi = WEN_CHANG[riGan];
    allZhis.forEach((zhi, idx) => {
      if (zhi === wenChangZhi) {
        result.ji.push(`${['年','月','日','时'][idx]}柱文昌星`);
      }
    });
    
    // 禄神
    const luZhi = LU_SHEN[riGan];
    allZhis.forEach((zhi, idx) => {
      if (zhi === luZhi) {
        result.ji.push(`${['年','月','日','时'][idx]}柱禄神`);
      }
    });
    
    // 羊刃
    const yangRenZhi = YANG_REN[riGan];
    allZhis.forEach((zhi, idx) => {
      if (zhi === yangRenZhi) {
        result.xiong.push(`${['年','月','日','时'][idx]}柱羊刃`);
      }
    });
    
    // 驿马
    const findSanHeKey = (zhi) => {
      if ('寅午戌'.includes(zhi)) return '寅午戌';
      if ('申子辰'.includes(zhi)) return '申子辰';
      if ('巳酉丑'.includes(zhi)) return '巳酉丑';
      if ('亥卯未'.includes(zhi)) return '亥卯未';
      return '';
    };
    const yiMaZhi = YI_MA[findSanHeKey(riZhi)] || YI_MA[findSanHeKey(nianZhi)];
    allZhis.forEach((zhi, idx) => {
      if (zhi === yiMaZhi) result.ji.push(`${['年','月','日','时'][idx]}柱驿马星`);
    });
    
    // 桃花
    const taoHuaZhi = TAO_HUA[findSanHeKey(riZhi)] || TAO_HUA[findSanHeKey(nianZhi)];
    allZhis.forEach((zhi, idx) => {
      if (zhi === taoHuaZhi) result.other.push(`${['年','月','日','时'][idx]}柱桃花`);
    });
    
    // 华盖
    const huaGaiZhi = HUA_GAI[findSanHeKey(riZhi)] || HUA_GAI[findSanHeKey(nianZhi)];
    allZhis.forEach((zhi, idx) => {
      if (zhi === huaGaiZhi) result.ji.push(`${['年','月','日','时'][idx]}柱华盖星`);
    });
    
    // 孤辰
    const findGuGuaKey = (zhi) => {
      if ('亥子丑'.includes(zhi)) return '亥子丑';
      if ('寅卯辰'.includes(zhi)) return '寅卯辰';
      if ('巳午未'.includes(zhi)) return '巳午未';
      if ('申酉戌'.includes(zhi)) return '申酉戌';
      return '';
    };
    const guChenZhi = GU_CHEN[findGuGuaKey(nianZhi)];
    if (guChenZhi && allZhis.includes(guChenZhi)) result.xiong.push('命带孤辰');
    
    const guaSuZhi = GUA_SU[findGuGuaKey(nianZhi)];
    if (guaSuZhi && allZhis.includes(guaSuZhi)) result.xiong.push('命带寡宿');
    
    // 魁罡
    if (KUI_GANG.includes(riGanZhi)) result.ji.push('日柱魁罡格');
    
    // 十恶大败
    if (SHI_E_DA_BAI.includes(riGanZhi)) result.xiong.push('十恶大败日');
    
    // 孤鸾煞
    if (GU_LUAN.includes(riGanZhi)) result.xiong.push('孤鸾煞');
    
    // 阴阳差错
    if (YIN_YANG_CHA_CUO.includes(riGanZhi)) result.other.push('阴阳差错日');
    
    // 天赦
    if (TIAN_SHE.includes(riGanZhi)) result.ji.push('天赦日');
    
    // 将星
    const jiangXingZhi = JIANG_XING[findSanHeKey(riZhi)] || JIANG_XING[findSanHeKey(nianZhi)];
    allZhis.forEach((zhi, idx) => {
      if (zhi === jiangXingZhi) result.ji.push(`${['年','月','日','时'][idx]}柱将星`);
    });
    
    return result;
  }

  /**
   * 计算大运
   */
  calcDaYun(birthYear, birthMonth, birthDay, monthPillar, adjustedYear, adjustedMonth, adjustedDay, isMale) {
    const yearGan = TIAN_GAN[(adjustedYear - 4) % 10 < 0 ? (adjustedYear - 4) % 10 + 10 : (adjustedYear - 4) % 10];
    const isYangYear = GAN_YINYANG[yearGan] === 1;
    
    // 顺排：阳男阴女；逆排：阴男阳女
    const isShunPai = (isYangYear && isMale) || (!isYangYear && !isMale);
    
    // 起运月柱索引
    const yueZhiIdx = YUE_ZHI.indexOf(monthPillar.zhi);
    const yueGanIdx = TIAN_GAN.indexOf(monthPillar.gan);
    
    // 生成大运（10步）
    const daYunList = [];
    for (let i = 1; i <= 10; i++) {
      let newGanIdx, newZhiIdx;
      if (isShunPai) {
        newGanIdx = (yueGanIdx + i) % 10;
        newZhiIdx = (yueZhiIdx + i) % 12;
      } else {
        newGanIdx = (yueGanIdx - i) % 10;
        newZhiIdx = (yueZhiIdx - i) % 12;
        if (newGanIdx < 0) newGanIdx += 10;
        if (newZhiIdx < 0) newZhiIdx += 12;
      }
      
      const gan = TIAN_GAN[newGanIdx];
      const zhi = DI_ZHI[newZhiIdx];
      
      daYunList.push({
        ganZhi: gan + zhi,
        gan, zhi,
        startAge: 0, // 稍后填入
        nayin: this.getNayin(gan + zhi)
      });
    }
    
    return daYunList;
  }

  /**
   * 计算起运年龄
   * 阳男阴女顺数到下一个节气，阴男阳女逆数到上一个节气
   */
  calcQiYun(birthYear, birthMonth, birthDay, monthPillar, adjustedYear, adjustedMonth, adjustedDay, isMale) {
    const yearGan = TIAN_GAN[(adjustedYear - 4) % 10 < 0 ? (adjustedYear - 4) % 10 + 10 : (adjustedYear - 4) % 10];
    const isYangYear = GAN_YINYANG[yearGan] === 1;
    const isShun = (isYangYear && isMale) || (!isYangYear && !isMale);
    
    // 简化的起运计算：从生日到最近节气的天数除以3
    const jieQiDayMap = { 2:4, 3:6, 4:5, 5:6, 6:6, 7:7, 8:8, 9:8, 10:8, 11:8, 12:7, 1:6 };
    
    let targetMonth, targetDay;
    if (isShun) {
      // 顺排：找下一个节气
      targetMonth = adjustedMonth + 1;
      if (targetMonth > 12) targetMonth = 1;
      targetDay = jieQiDayMap[targetMonth] || 6;
    } else {
      // 逆排：找上一个节气
      targetMonth = adjustedMonth;
      targetDay = jieQiDayMap[adjustedMonth] || 6;
    }
    
    // 计算天数差
    const birthDate = new Date(adjustedYear, adjustedMonth - 1, adjustedDay);
    let targetDate;
    if (isShun) {
      targetDate = new Date(adjustedYear, targetMonth - 1, targetDay);
      if (targetDate <= birthDate) {
        targetDate = new Date(adjustedYear + 1, targetMonth - 1, targetDay);
      }
    } else {
      targetDate = new Date(adjustedYear, targetMonth - 1, targetDay);
      if (targetDate >= birthDate) {
        targetDate = new Date(adjustedYear - 1, targetMonth - 1, targetDay);
      }
    }
    
    let daysDiff = Math.abs(Math.floor((targetDate - birthDate) / (1000 * 60 * 60 * 24)));
    let age = daysDiff / 3;
    
    // 3天=1岁，1天=4个月
    if (age < 1) age = 1;
    
    const qiYunAge = Math.ceil(age);
    
    // 如果是顺排，从起运年龄开始，每10年换一运
    // 如果是逆排，也类似
    return { qiYunAge, isShunPai: isShun };
  }

  /**
   * 计算胎元、命宫、身宫（三垣）
   */
  calcSanYuan(monthPillar, hourPillar) {
    // 胎元：月干进位一，月支进位三
    const yueGanIdx = TIAN_GAN.indexOf(monthPillar.gan);
    const yueZhiIdx = YUE_ZHI.indexOf(monthPillar.zhi);
    
    const taiGan = TIAN_GAN[(yueGanIdx + 1) % 10];
    const taiZhi = YUE_ZHI[(yueZhiIdx + 3) % 12];
    
    // 命宫：子起正月逆查，生月支上起生时，顺查至卯
    const hourZhiIdx = SHI_ZHI.indexOf(hourPillar.zhi);
    const mingZhiIdx = (13 - yueZhiIdx + hourZhiIdx) % 12;
    const mingZhi = SHI_ZHI[mingZhiIdx];
    
    // 命宫天干
    const mingGan = YUE_GAN_MAP[monthPillar.gan][mingZhiIdx];
    
    // 身宫：子起正月顺查，生月支上起生时，逆推至酉
    const shenZhiIdx = (yueZhiIdx + hourZhiIdx + 5) % 12;
    const shenZhi = SHI_ZHI[shenZhiIdx];
    const shenGan = YUE_GAN_MAP[monthPillar.gan][shenZhiIdx];
    
    return {
      taiYuan: { ganZhi: taiGan + taiZhi, gan: taiGan, zhi: taiZhi },
      mingGong: { ganZhi: mingGan + mingZhi, gan: mingGan, zhi: mingZhi },
      shenGong: { ganZhi: shenGan + shenZhi, gan: shenGan, zhi: shenZhi }
    };
  }

  /**
   * 统计五行数量
   */
  countWuxing(yearPillar, monthPillar, dayPillar, hourPillar, cangGan) {
    const count = { '金': 0, '木': 0, '水': 0, '火': 0, '土': 0 };
    
    // 天干五行
    [yearPillar.gan, monthPillar.gan, dayPillar.gan, hourPillar.gan].forEach(gan => {
      count[GAN_WUXING[gan]]++;
    });
    
    // 地支五行
    [yearPillar.zhi, monthPillar.zhi, dayPillar.zhi, hourPillar.zhi].forEach(zhi => {
      count[ZHI_WUXING[zhi]]++;
    });
    
    // 地支藏干（加权计算）
    Object.values(cangGan).forEach(gans => {
      gans.forEach((gan, idx) => {
        count[GAN_WUXING[gan]] += (idx === 0 ? 0.5 : 0.25);
      });
    });
    
    return count;
  }

  /**
   * 日主强弱判断
   */
  judgeDayMasterStrength(bazi) {
    const riGan = bazi.riGan;
    const riWuxing = bazi.riWuxing;
    const wc = bazi.wuxingCount;
    
    // 简单判断：得月令 + 同类多少
    const yueZhi = bazi.monthPillar.zhi;
    const yueWuxing = ZHI_WUXING[yueZhi];
    const deYueLing = (riWuxing === yueWuxing);
    
    // 印星（生我者）和比劫（同我者）的总数
    const tongLei = wc[riWuxing];
    
    // 月支藏干中是否含日主五行
    let hasRiWuxingInYueZhi = false;
    if (ZHI_CANG_GAN[yueZhi]) {
      hasRiWuxingInYueZhi = ZHI_CANG_GAN[yueZhi].some(g => GAN_WUXING[g] === riWuxing);
    }
    
    let score = 0;
    if (deYueLing) score += 3;
    if (hasRiWuxingInYueZhi) score += 2;
    if (tongLei >= 3) score += 2;
    else if (tongLei >= 2) score += 1;
    
    if (score >= 5) return '偏旺';
    if (score >= 3) return '中和偏旺';
    if (score >= 2) return '中和';
    if (score >= 1) return '中和偏弱';
    return '偏弱';
  }
}

    { name: '日柱', gz: bazi.dayPillar.ganZhi, gan: bazi.dayPillar.gan, zhi: bazi.dayPillar.zhi },
    { name: '时柱', gz: bazi.hourPillar.ganZhi, gan: bazi.hourPillar.gan, zhi: bazi.hourPillar.zhi }
  ];
  
  pillars.forEach(function(p) {
    // 天干关系
    var ganRelation = SHI_SHEN_MAP[riGan][liuNianGan];
    
    // 天合地合

    var diHe = isDiZhiHe(liuNianZhi, p.zhi);

  return heMap[g1 + g2] || false;
}

function isDiZhiHe(z1, z2) {
  var combo = z1 + z2;
  var comboR = z2 + z1;
  return (DI_ZHI_LIU_HE[combo] || DI_ZHI_LIU_HE[comboR]) ? true : false;

// ========== 流月计算引擎 ==========
function calculateLiuYue(bazi, targetYear, targetMonth) {
  // 月份地支（寅月=正月，通常是2月立春后）
  var yueZhiIdx = targetMonth - 2; // 1月=丑(11), 2月=寅(0)...
  if (yueZhiIdx < 0) yueZhiIdx += 12;
  var yueZhi = YUE_ZHI[yueZhiIdx];
  
  // 流年年干
  var nianGanIdx = (targetYear - 4) % 10;
  if (nianGanIdx < 0) nianGanIdx += 10;
  var nianGan = TIAN_GAN[nianGanIdx];
  
  // 月干
  var yueGan = YUE_GAN_MAP[nianGan][yueZhiIdx];
  var yueGanZhi = yueGan + yueZhi;
  
  // 与日主的关系
  var riGan = bazi.riGan;
  var shiShen = SHI_SHEN_MAP[riGan][yueGan];
  var wuxing = GAN_WUXING[yueGan];
  
  // 与日柱地支的关系
  var riZhi = bazi.dayPillar.zhi;
  var diChong = DI_ZHI_LIU_CHONG[yueZhi] === riZhi;
  var diHe = isDiZhiHe(yueZhi, riZhi);
  
  return {
    year: targetYear,
    month: targetMonth,
    ganZhi: yueGanZhi,
    gan: yueGan,
    zhi: yueZhi,
    wuxing: wuxing,
    shiShen: shiShen,
    diChong: diChong,
    diHe: diHe
  };
}

    '孤鸾煞': '主婚姻波折、晚婚。现代版：对感情要求高，不将就。建议晚婚（30岁后），婚前充分了解对方。现代社会中不婚也是一种选择。',
    '阴阳差错': '主婚姻不顺、沟通困难。现代版：夫妻之间需加强沟通，学习两性相处之道。可以寻求婚姻咨询帮助。'
  };
  
  return details[shenShaName] || null;
}

console.log('Enhanced Bazi module loaded.');


// ========== 应用逻辑 ==========
(function() {
  // localStorage 持久化
  function saveBaziData() {
    try {
      var data = {
        name: document.getElementById('name').value,
        gender: document.getElementById('gender').value,
        birthYear: document.getElementById('birthYear').value,
        birthMonth: document.getElementById('birthMonth').value,
        birthDay: document.getElementById('birthDay').value,
        birthHour: document.getElementById('birthHour').value,
        birthMinute: document.getElementById('birthMinute').value
      };
      localStorage.setItem('bazi_saved', JSON.stringify(data));
    } catch(e) {}
  }
  
  function loadBaziData() {
    try {
      var saved = localStorage.getItem('bazi_saved');
      if (saved) {
        var data = JSON.parse(saved);
        if (data.name) document.getElementById('name').value = data.name;
        if (data.gender) document.getElementById('gender').value = data.gender;
        if (data.birthYear) document.getElementById('birthYear').value = data.birthYear;
        if (data.birthMonth) document.getElementById('birthMonth').value = data.birthMonth;
        if (data.birthDay) document.getElementById('birthDay').value = data.birthDay;
        if (data.birthHour) document.getElementById('birthHour').value = data.birthHour;
        if (data.birthMinute) document.getElementById('birthMinute').value = data.birthMinute;
      }
    } catch(e) {}
  }
  
  function updateDays() {
    var month = parseInt(document.getElementById('birthMonth').value);
    var year = parseInt(document.getElementById('birthYear').value) || 1990;
    var daysInMonth = new Date(year, month, 0).getDate();
    var daySelect = document.getElementById('birthDay');
    daySelect.innerHTML = '';
    for (var d = 1; d <= daysInMonth; d++) {
      daySelect.innerHTML += '<option value="' + d + '">' + d + '日</option>';
    }
  }
  
  document.getElementById('birthMonth').addEventListener('change', updateDays);
  document.getElementById('birthYear').addEventListener('change', updateDays);
  loadBaziData();
  updateDays();
  
  window.generateBazi = function() {
    try {
      var year = parseInt(document.getElementById('birthYear').value);
      var month = parseInt(document.getElementById('birthMonth').value);
      var day = parseInt(document.getElementById('birthDay').value);
      var hour = parseInt(document.getElementById('birthHour').value);
      var minute = parseInt(document.getElementById('birthMinute').value) || 0;
      var isMale = document.getElementById('gender').value === 'male';
      var name = document.getElementById('name').value || '命主';
      
      if (!year || !month || !day) { alert('请填写完整的出生日期'); return; }
      
      var bazi = baziEngine.calculate(year, month, day, hour, minute, isMale);
      saveBaziData();
      renderAll(bazi, name);
      
      document.getElementById('resultSection').classList.add('visible');
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
    } catch(e) {
      alert('排盘出错：' + e.message);
      console.error(e);
    }
  };
  
  function renderAll(bazi, name) {
    // 1. 颜色化四柱表格
    var tableHtml = '<table class="bazi-table">';
    tableHtml += '<tr><th></th><th class="pillar-header">年 柱</th><th class="pillar-header">月 柱</th><th class="pillar-header day-column">日 柱</th><th class="pillar-header">时 柱</th></tr>';
    ['year','month','day','hour'].forEach(function(p) {
      var g = bazi[p+'Pillar'].gan;
      var wx = GAN_WUXING[g];
      var dc = p==='day'?' day-column':'';
      tableHtml += '<tr><th>天干(' + WUXING_ICONS[wx] + ')</th><td class="gan-cell' + dc + '" style="color:' + WUXING_COLORS[wx] + ';">' + g + '</td><td class="gan-cell' + dc + '" style="color:' + WUXING_COLORS[GAN_WUXING[bazi.monthPillar.gan]] + ';">' + bazi.monthPillar.gan + '</td><td class="gan-cell day-column" style="color:' + WUXING_COLORS[GAN_WUXING[bazi.dayPillar.gan]] + ';">' + bazi.dayPillar.gan + '</td><td class="gan-cell' + dc + '" style="color:' + WUXING_COLORS[GAN_WUXING[bazi.hourPillar.gan]] + ';">' + bazi.hourPillar.gan + '</td></tr>';
    });
    tableHtml += '<tr><th>地支</th><td class="zhi-cell" style="color:' + WUXING_COLORS[ZHI_WUXING[bazi.yearPillar.zhi]] + ';">' + bazi.yearPillar.zhi + '</td><td class="zhi-cell" style="color:' + WUXING_COLORS[ZHI_WUXING[bazi.monthPillar.zhi]] + ';">' + bazi.monthPillar.zhi + '</td><td class="zhi-cell day-column" style="color:' + WUXING_COLORS[ZHI_WUXING[bazi.dayPillar.zhi]] + ';">' + bazi.dayPillar.zhi + '</td><td class="zhi-cell" style="color:' + WUXING_COLORS[ZHI_WUXING[bazi.hourPillar.zhi]] + ';">' + bazi.hourPillar.zhi + '</td></tr>';
    tableHtml += '<tr><th>藏干</th><td class="canggan-cell">' + bazi.cangGan.year.join('') + '</td><td class="canggan-cell">' + bazi.cangGan.month.join('') + '</td><td class="canggan-cell day-column">' + bazi.cangGan.day.join('') + '</td><td class="canggan-cell">' + bazi.cangGan.hour.join('') + '</td></tr>';
    tableHtml += '<tr><th>纳音</th><td>' + bazi.nayin.year + '</td><td>' + bazi.nayin.month + '</td><td class="day-column">' + bazi.nayin.day + '</td><td>' + bazi.nayin.hour + '</td></tr>';
    tableHtml += '<tr><th>十神</th><td>' + bazi.shiShen.year + '</td><td>' + bazi.shiShen.month + '</td><td class="day-column">' + bazi.shiShen.day + '</td><td>' + bazi.shiShen.hour + '</td></tr>';
    tableHtml += '<tr><th>长生</th><td>' + bazi.changSheng.year + '</td><td>' + bazi.changSheng.month + '</td><td class="day-column">' + bazi.changSheng.day + '</td><td>' + bazi.changSheng.hour + '</td></tr>';
    tableHtml += '</table>';
    document.getElementById('baziTable').innerHTML = tableHtml;
    
    // 2. 基本信息
    document.getElementById('infoRow').innerHTML = 
      '<div class="info-card"><div class="label">姓名</div><div class="value large">' + name + '</div></div>' +
      '<div class="info-card"><div class="label">日主</div><div class="value large" style="color:' + WUXING_COLORS[bazi.riWuxing] + ';">' + bazi.riGan + '（' + bazi.riWuxing + '）</div></div>' +
      '<div class="info-card"><div class="label">生肖</div><div class="value large">' + bazi.shengXiao + '</div></div>' +
      '<div class="info-card"><div class="label">强弱</div><div class="value large">' + baziEngine.judgeDayMasterStrength(bazi) + '</div></div>';
    
    // 3. 三垣
    document.getElementById('sanYuanRow').innerHTML = 
      '<div class="info-card"><div class="label">胎元</div><div class="value">' + bazi.sanYuan.taiYuan.ganZhi + '</div></div>' +
      '<div class="info-card"><div class="label">命宫</div><div class="value">' + bazi.sanYuan.mingGong.ganZhi + '</div></div>' +
      '<div class="info-card"><div class="label">身宫</div><div class="value">' + bazi.sanYuan.shenGong.ganZhi + '</div></div>' +
      '<div class="info-card"><div class="label">起运</div><div class="value large">' + bazi.qiYunAge.qiYunAge + '岁</div></div>';
    
    // 4. 颜色化五行柱状图
    var wxNames = ['金', '木', '水', '火', '土'];
    var maxV = Math.max(1, wxNames.reduce(function(m, w) { return Math.max(m, bazi.wuxingCount[w] || 0); }, 0));
    var wxHtml = '<div class="wuxing-bars">';
    wxNames.forEach(function(w) {
      var v = Math.round((bazi.wuxingCount[w] || 0) * 10) / 10;
      var p = (v / maxV * 100);
      wxHtml += '<div class="wuxing-bar-row"><div class="wuxing-bar-label" style="color:' + WUXING_COLORS[w] + ';">' + WUXING_ICONS[w] + ' ' + w + '</div><div class="wuxing-bar-track"><div class="wuxing-bar-fill" style="width:' + p + '%;background:' + WUXING_COLORS[w] + ';"></div></div><div class="wuxing-bar-value">' + v + '</div></div>';
    });
    wxHtml += '</div>';
    document.getElementById('wuxingChart').innerHTML = wxHtml;
    
    // 5. 神煞标签
    var ssHtml = '<div class="shensha-tags">';
    bazi.shenSha.ji.forEach(function(s) { ssHtml += '<span class="shensha-tag ji">吉 ' + s + '</span> '; });
    bazi.shenSha.xiong.forEach(function(s) { ssHtml += '<span class="shensha-tag xiong">凶 ' + s + '</span> '; });
    bazi.shenSha.other.forEach(function(s) { ssHtml += '<span class="shensha-tag" style="background:#F5F0E8;color:#8B7355;border:1px solid #D4C4A8;">' + s + '</span> '; });
    if (bazi.shenSha.ji.length === 0 && bazi.shenSha.xiong.length === 0) ssHtml += '<span style="color:var(--text-muted);">此命局神煞不多，以五行生克为主</span>';
    ssHtml += '</div>';
    document.getElementById('shenshaTags').innerHTML = ssHtml;
    
    // 6. 详细大运（带气象预测）
    var qiYun = bazi.qiYunAge.qiYunAge;
    var str = baziEngine.judgeDayMasterStrength(bazi);
    var riWx = bazi.riWuxing;
    var dyHtml = '<table class="dayun-table"><tr><th>步</th><th>年龄</th><th>大运</th><th>五行</th><th>纳音</th><th>喜忌</th><th>运势预测</th></tr>';
    bazi.daYun.forEach(function(yun, idx) {
      var sa = qiYun + idx * 10; var ea = sa + 9;
      var yw = GAN_WUXING[yun.gan];
      var isXi = false;
      if (str.indexOf('旺') >= 0) isXi = (yw !== riWx);
      else if (str.indexOf('弱') >= 0) isXi = (yw === riWx);
      var pred = predictDaYunEvents(idx, bazi, qiYun);
      var evtStr = pred.events.slice(0, 2).join('; ');
      dyHtml += '<tr><td>' + (idx+1) + '</td><td>' + sa + '-' + ea + '</td><td style="font-weight:600;">' + yun.ganZhi + '</td><td><span class="wuxing-dot" style="background:' + WUXING_COLORS[yw] + ';"></span> ' + yw + '</td><td>' + yun.nayin + '</td><td class="' + (isXi?'yun-good':'yun-bad') + '">' + (isXi?'喜':'忌') + '</td><td style="font-size:0.78rem;text-align:left;">' + evtStr + '</td></tr>';
    });
    dyHtml += '</table>';
    document.getElementById('dayunTable').innerHTML = dyHtml;
    
    // 7. 流年流月
    var currentYear = new Date().getFullYear();
    var liuNian = calculateLiuNian(bazi, currentYear);
    var predictions = predictLiuNianEvents(liuNian, bazi);
    var lnHtml = '<div class="liunian-header">';
    lnHtml += '<span class="liunian-year">' + currentYear + '年</span> ';
    lnHtml += '<span class="liunian-ganzhi" style="color:' + WUXING_COLORS[liuNian.wuxing] + ';">' + liuNian.ganZhi + '</span> ';
    lnHtml += '<span class="liunian-shishen tag-' + (predictions.isXi ? 'xi' : 'ji') + '">' + liuNian.shiShen + (predictions.isXi ? ' (喜)' : ' (忌)') + '</span>';
    lnHtml += '</div>';
    if (liuNian.shenSha.length > 0) { lnHtml += '<div class="liunian-shensha">'; liuNian.shenSha.forEach(function(ss) { lnHtml += '<span class="shensha-tag ji">' + ss + '入运</span> '; }); lnHtml += '</div>'; }
    lnHtml += '<div class="liunian-events"><h4>' + currentYear + '年运势预测</h4><ul>';
    predictions.events.forEach(function(e) { lnHtml += '<li>' + e + '</li>'; });
    lnHtml += '</ul></div>';
    lnHtml += '<div class="liuyue-header"><h4>' + currentYear + '年逐月运势</h4></div><div class="liuyue-grid">';
    for (var mm = 1; mm <= 12; mm++) {
      var liuYue = calculateLiuYue(bazi, currentYear, mm);
      var ind = liuYue.diChong ? ' ⚡' : (liuYue.diHe ? ' 🤝' : '');
      lnHtml += '<div class="liuyue-cell" style="border-left:3px solid ' + WUXING_COLORS[liuYue.wuxing] + ';"><div class="liuyue-month">' + mm + '月' + ind + '</div><div class="liuyue-ganzhi">' + liuYue.ganZhi + '</div><div class="liuyue-shishen">' + liuYue.shiShen + '</div></div>';
    }
    lnHtml += '</div>';
    document.getElementById('liunianContent').innerHTML = lnHtml;
    
    // 8. 十神详解
    var seenSS = {};
    var shHtml = '<div class="shishen-cards">';
    ['year','month','day','hour'].forEach(function(p) {
      var ss = bazi.shiShen[p];
      var g = bazi[p+'Pillar'].gan;
      var wx = GAN_WUXING[g];
      if (!seenSS[ss]) { seenSS[ss] = true;
        var detail = getShiShenDetail(ss, wx);
        if (detail) {
          shHtml += '<div class="shishen-card" style="border-left:3px solid ' + WUXING_COLORS[wx] + ';">';
          shHtml += '<div class="shishen-card-header"><span class="shishen-name">' + ss + '</span><span class="shishen-wuxing" style="color:' + WUXING_COLORS[wx] + ';">' + WUXING_ICONS[wx] + ' ' + wx + '</span></div>';
          shHtml += '<div class="shishen-body"><div class="shishen-line"><strong>天性：</strong>' + detail.nature + '</div><div class="shishen-line"><strong>现代：</strong>' + detail.modern + '</div><div class="shishen-line"><strong>职业：</strong>' + detail.career + '</div><div class="shishen-line"><strong>优势：</strong>' + detail.strength + '</div><div class="shishen-line"><strong>注意：</strong>' + detail.weakness + '</div></div></div>';
        }
      }
    });
    shHtml += '</div>';
    document.getElementById('shishenContent').innerHTML = shHtml;
    
    // 9. 神煞详解
    var allSS = bazi.shenSha.ji.concat(bazi.shenSha.xiong).concat(bazi.shenSha.other);
    var seenSha = {};
    var sshaHtml = '<div class="shensha-cards">';
    allSS.forEach(function(ss) {
      var ssName = ss.replace(/^[年月日时]柱/, '');
      if (!seenSha[ssName]) { seenSha[ssName] = true;
        var detail = getShenShaDetail(ssName);
        if (detail) {
          var isJi = bazi.shenSha.ji.some(function(s) { return s.indexOf(ssName) >= 0; });
          sshaHtml += '<div class="shensha-card" style="border-left:3px solid ' + (isJi?'#C0392B':'#7D6608') + ';">';
          sshaHtml += '<div class="shensha-card-header"><span class="shensha-tag ' + (isJi?'ji':'xiong') + '">' + (isJi?'吉':'凶') + '</span><span class="shensha-name">' + ssName + '</span></div>';
          sshaHtml += '<div class="shensha-body">' + detail + '</div></div>';
        }
      }
    });
    if (Object.keys(seenSha).length === 0) sshaHtml += '<p style="color:var(--text-muted);">此命局特殊神煞不多，以五行生克为主分析。</p>';
    sshaHtml += '</div>';
    document.getElementById('shenshaDetailContent').innerHTML = sshaHtml;
    
    // 10. 综合分析报告
    var report = baziAnalysis.generateReport(bazi);
    document.getElementById('analysisContent').textContent = report;
  }
  
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.activeElement && document.activeElement.tagName !== 'TEXTAREA') {
      generateBazi();
    }
  });
  
  console.log('八字命盘增强系统就绪 ✓');
})();
</script>
